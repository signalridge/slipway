name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "README.md"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "README.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pages-status:
    name: Check Pages Deployment
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
    outputs:
      deploy: ${{ steps.pages.outputs.deploy }}
    steps:
      - name: Check GitHub Pages status
        id: pages
        env:
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref }}
        run: |
          if [ "$REF_NAME" != "refs/heads/main" ]; then
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          case "$EVENT_NAME" in
            push|workflow_dispatch)
              ;;
            *)
              echo "deploy=false" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac

          status=$(curl -sS -o /tmp/pages.json -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/pages")

          if [ "$status" = "200" ]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$status" = "404" ]; then
            echo "::notice::GitHub Pages is not enabled; docs were built but deployment was skipped."
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::error::Unexpected GitHub Pages API status: ${status}"
          cat /tmp/pages.json
          exit 1

  build:
    name: Build Docs
    runs-on: ubuntu-latest
    needs: pages-status
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-mkdocs-${{ hashFiles('mkdocs.yml') }}
          restore-keys: |
            ${{ runner.os }}-pip-mkdocs-
      - name: Install MkDocs
        run: pip install mkdocs-material
      - name: Build docs
        run: mkdocs build --strict
      - name: Upload Pages artifact
        if: needs.pages-status.outputs.deploy == 'true'
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    name: Deploy Docs
    if: needs.pages-status.outputs.deploy == 'true'
    needs: [pages-status, build]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
