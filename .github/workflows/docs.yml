name: Docs
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "website/**"
      - "README.md"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "website/**"
      - "README.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true
jobs:
  pages-status:
    name: Check Pages Deployment
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
    outputs:
      deploy: ${{ steps.pages.outputs.deploy }}
    steps:
      - name: Check GitHub Pages status
        id: pages
        env:
          EVENT_NAME: ${{ github.event_name }}
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref }}
        run: |
          if [ "$REF_NAME" != "refs/heads/main" ]; then
            printf 'deploy=false\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          case "$EVENT_NAME" in
            push|workflow_dispatch)
              ;;
            *)
              printf 'deploy=false\n' >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac

          status=$(curl -sS -o /tmp/pages.json -w "%{http_code}" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "${GITHUB_API_URL}/repos/${GITHUB_REPOSITORY}/pages")

          if [ "$status" = "200" ]; then
            printf 'deploy=true\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$status" = "404" ]; then
            echo "::notice::GitHub Pages is not enabled; docs were built but deployment was skipped."
            printf 'deploy=false\n' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::error::Unexpected GitHub Pages API status: ${status}"
          cat /tmp/pages.json
          exit 1
  build:
    name: Build Docs
    runs-on: ubuntu-latest
    needs: pages-status
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - name: Set up Node
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: website/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build docs
        run: npm run build
      - name: Upload Pages artifact
        if: needs.pages-status.outputs.deploy == 'true'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5
        with:
          path: website/dist
  deploy:
    name: Deploy Docs
    if: needs.pages-status.outputs.deploy == 'true'
    needs: [pages-status, build]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5
