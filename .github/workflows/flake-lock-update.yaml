name: Flake Lock Update

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: flake-lock-update
  cancel-in-progress: true

jobs:
  update-flake-lock:
    name: Update flake.lock
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: DeterminateSystems/nix-installer-action@a7ad9c4f0c65208097f4d34f3cfa1913b80cce5c # main
      - uses: DeterminateSystems/magic-nix-cache-action@76aaf8814cdb385b86597c32b8c51b66b69b0839 # main
        with:
          use-flakehub: false
          use-gha-cache: true
      - name: Update lock file
        run: nix flake update
      - name: Create pull request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          branch: chore/update-flake-lock
          delete-branch: true
          commit-message: "chore(nix): update flake.lock"
          title: "chore(nix): update flake.lock"
          body: |
            Automated update of Nix flake inputs.

            This PR was created by `.github/workflows/flake-lock-update.yaml`.
          labels: |
            dependencies
            nix
