name: Flake Lock Update

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: flake-lock-update
  cancel-in-progress: true

jobs:
  update-flake-lock:
    name: Update flake.lock
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main
        with:
          use-flakehub: false
          use-gha-cache: true
      - name: Update lock file
        run: nix flake update
      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: chore/update-flake-lock
          delete-branch: true
          commit-message: "chore(nix): update flake.lock"
          title: "chore(nix): update flake.lock"
          body: |
            Automated update of Nix flake inputs.

            This PR was created by `.github/workflows/flake-lock-update.yaml`.
          labels: |
            dependencies
            nix
