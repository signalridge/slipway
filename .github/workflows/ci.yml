name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions:
  contents: read
jobs:
  lint-yaml:
    name: Lint YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install yamllint
        run: pip install yamllint
      - name: Run yamllint
        run: yamllint -c .yamllint.yaml .
  lint-actions:
    name: Lint Actions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run actionlint
        uses: raven-actions/actionlint@v2
  lint-markdown:
    name: Lint Markdown
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v23
        with:
          config: .markdownlint.yaml
          globs: |
            **/*.md
            !CHANGELOG.md
            !.codex/**
            !.github/**
            !.worktrees/**
            !artifacts/**
            !internal/tmpl/templates/**
  lint-go:
    name: Lint Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
        env:
          GIT_CONFIG_COUNT: "1"
          GIT_CONFIG_KEY_0: core.longpaths
          GIT_CONFIG_VALUE_0: "true"
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Download dependencies
        run: go mod download
      - name: Run tests
        run: go test -timeout=20m ./... -count=1
  race:
    name: Race Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Run race tests
        run: go test -timeout=20m ./... -race -count=1
  coverage:
    name: Kernel Coverage Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Measure governance-kernel coverage
        run: |
          mkdir -p tmp
          kernel_pkgs="$(go list \
            ./internal/engine/gate \
            ./internal/engine/governance \
            ./internal/engine/progression | paste -sd, -)"
          go test -timeout=20m ./... -count=1 \
            -coverpkg="${kernel_pkgs}" \
            -coverprofile=tmp/coverage-kernel.out
      - name: Enforce kernel coverage baseline (fails closed on regression)
        run: go run ./internal/coverage/cmd/covergate -check -profile tmp/coverage-kernel.out
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-go, test]
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Verify module files
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
      - name: Vet
        run: go vet ./...
      - name: Build packages
        run: go build ./...
      - name: Build release-smoke binary
        run: |
          mkdir -p bin
          go build \
            -ldflags="-s -w \
            -X github.com/signalridge/slipway/cmd.version=ci \
            -X github.com/signalridge/slipway/cmd.commit=${GITHUB_SHA::12} \
            -X github.com/signalridge/slipway/cmd.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o bin/slipway .
          ./bin/slipway --version
          ./bin/slipway --help
  cross-compile:
    name: Cross Compile
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist
          suffix=""
          if [ "${GOOS}" = "windows" ]; then suffix=".exe"; fi
          go build -ldflags="-s -w" -o "dist/slipway-${GOOS}-${GOARCH}${suffix}" .
