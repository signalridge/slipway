<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Slipway mark">
  <title>Slipway mark</title>
  <defs>
    <style>
      :root{ --c1:#10b981; --c2:#22c55e; --c3:#84cc16; --dot:#16a34a; }
      @media (prefers-color-scheme: dark){
        :root{ --c1:#34d399; --c2:#4ade80; --c3:#a3e635; --dot:#4ade80; }
      }
      .m1{stroke:var(--c1);fill:none;} .m2{stroke:var(--c2);fill:none;} .m3{stroke:var(--c3);fill:none;}
      .md{fill:var(--dot);}
    </style>
  </defs>
  <path class="m1" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" d="M22,22 L50,42 L78,22"/>
  <path class="m2" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" d="M22,38 L50,58 L78,38"/>
  <path class="m3" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" d="M22,54 L50,74 L78,54"/>
  <circle class="md" cx="50" cy="87" r="5.5"/>
</svg>
