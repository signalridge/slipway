<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="run-states-title run-states-desc">
  <title id="run-states-title">Slipway Run states and recovery</title>
  <desc id="run-states-desc">A Run is created only by an explicit user start and becomes active. An active Run pauses for one of four reported reasons: a human decision, an unavailable environment dependency, an exhausted Action budget, or confirmation of an exact destructive scope. A changed or unavailable issue source pauses as a decision rather than as a reason of its own. Answering, confirming, or skipping returns a paused Run to active. Stop invalidates pending work but keeps the journal, and a stopped Run can be resumed. Ended is terminal and cannot be resumed. Every resume revalidates the original worktree identity and voids stale work.</desc>
  <metadata id="mermaid-source"><![CDATA[
stateDiagram-v2
  [*] --> Active: explicit user start (slipway run)
  Active --> Paused: needs_input or CLI budget_exhausted
  Paused --> Active: protocol answer / skip / resume
  Active --> Stopped: slipway stop · reorder · take over
  Stopped --> Active: protocol resume (explicit)
  Active --> Ended: automatic Action queue empty
  Ended --> [*]

  note right of Paused
    four reported reasons
    decision_required (includes changed or unavailable issue source)
    environment_unavailable
    budget_exhausted (CLI-only)
    destructive_confirmation_required
  end note

  note right of Stopped
    pending work invalidated
    journal retained and resumable
  end note

  note right of Ended
    terminal · not resumable
    not a certificate for tests, review, merge, or release
  end note
]]></metadata>
  <defs>
    <style>
      :root {
        --text: #0f172a;
        --muted: #64748b;
        --line: #94a3b8;
        --card: #ffffff;
        --card-border: #e2e8f0;
        --band: #f8fafc;
        --band-border: #e2e8f0;
        --entry-fill: #fff6e6;
        --entry-stroke: #d98a13;
        --action-fill: #fff0ea;
        --action-stroke: #f2643b;
        --host-fill: #f1f5f9;
        --host-stroke: #475569;
        --verify-fill: #e7faf6;
        --verify-stroke: #0e8077;
        --pause-fill: #f3efff;
        --pause-stroke: #7c5ce0;
        --stop-fill: #fff0f4;
        --stop-stroke: #c81e63;
        --term-fill: #0f172a;
        --term-text: #ffffff;
        --label-bg: #ffffff;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --text: #e6edf3;
          --muted: #8b949e;
          --line: #64748b;
          --card: #161b22;
          --card-border: #30363d;
          --band: #0d1117;
          --band-border: #30363d;
          --entry-fill: #3a2606;
          --entry-stroke: #fbbf24;
          --action-fill: #3a1a10;
          --action-stroke: #ff8a5c;
          --host-fill: #1e293b;
          --host-stroke: #94a3b8;
          --verify-fill: #04302b;
          --verify-stroke: #4fd6c6;
          --pause-fill: #241b42;
          --pause-stroke: #a78bfa;
          --stop-fill: #330a1b;
          --stop-stroke: #ff5e9a;
          --term-fill: #e6edf3;
          --term-text: #0d1117;
          --label-bg: #0d1117;
        }
      }
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
      .title-big { fill: var(--text); font-size: 19px; font-weight: 700; }
      .title { fill: var(--text); font-size: 14px; font-weight: 650; }
      .state-name { fill: var(--text); font-size: 16px; font-weight: 700; }
      .sub { fill: var(--muted); font-size: 11px; }
      .tiny { fill: var(--muted); font-size: 9.5px; }
      .tag { fill: var(--muted); font-size: 9.5px; font-weight: 700; letter-spacing: 1.4px; }
      .mono { fill: var(--text); font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace; font-size: 10.5px; font-weight: 600; }
      .mono-tiny { fill: var(--muted); font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace; font-size: 9.5px; }
      .band { fill: var(--band); stroke: var(--band-border); stroke-width: 1.5; }
      .card { fill: var(--card); stroke: var(--card-border); stroke-width: 1.6; }
      .entry { fill: var(--entry-fill); stroke: var(--entry-stroke); stroke-width: 1.8; }
      .active { fill: var(--verify-fill); stroke: var(--verify-stroke); stroke-width: 2.2; }
      .pause { fill: var(--pause-fill); stroke: var(--pause-stroke); stroke-width: 2; }
      .stop { fill: var(--stop-fill); stroke: var(--stop-stroke); stroke-width: 2; }
      .flow { fill: none; stroke: var(--line); stroke-width: 2; }
      .flow-main { fill: none; stroke: var(--verify-stroke); stroke-width: 2.2; }
      .flow-pause { fill: none; stroke: var(--pause-stroke); stroke-width: 1.9; }
      .flow-stop { fill: none; stroke: var(--stop-stroke); stroke-width: 1.9; }
      .edge-label { fill: var(--muted); font-size: 9px; font-style: italic; }
      .label-bg { fill: var(--label-bg); opacity: 0.96; }
      .term-text { fill: var(--term-text); font-size: 16px; font-weight: 700; }
      .note { fill: var(--band); stroke: var(--band-border); stroke-width: 1.2; }
    </style>
    <marker id="rs-arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--line)"/>
    </marker>
    <marker id="rs-arrow-main" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--verify-stroke)"/>
    </marker>
    <marker id="rs-arrow-pause" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--pause-stroke)"/>
    </marker>
    <marker id="rs-arrow-stop" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--stop-stroke)"/>
    </marker>
  </defs>

  <text class="title-big" x="40" y="36">Slipway · Run states and recovery</text>
  <text class="sub" x="40" y="58">explicit start · four reported pause reasons · stop keeps the journal · ended is terminal</text>

  <!-- edges painted before nodes -->
  <line class="flow" x1="96" y1="196" x2="169" y2="196" marker-end="url(#rs-arrow)"/>
  <path class="flow-pause" d="M400 175 H693" marker-end="url(#rs-arrow-pause)"/>
  <path class="flow-main" d="M700 228 H407" marker-end="url(#rs-arrow-main)"/>
  <path class="flow-stop" d="M270 274 V393" marker-end="url(#rs-arrow-stop)"/>
  <path class="flow-main" d="M360 400 V281" marker-end="url(#rs-arrow-main)"/>
  <path class="flow" d="M400 262 H560 V440 H693" marker-end="url(#rs-arrow)"/>

  <!-- explicit start -->
  <circle cx="65" cy="196" r="26" fill="var(--entry-fill)" stroke="var(--entry-stroke)" stroke-width="1.8"/>
  <circle cx="65" cy="196" r="7" fill="var(--entry-stroke)"/>
  <text class="sub" x="65" y="243" text-anchor="middle">explicit start</text>
  <text class="mono-tiny" x="65" y="258" text-anchor="middle">slipway run</text>

  <!-- Active -->
  <rect class="active" x="176" y="150" width="224" height="124" rx="18"/>
  <text class="state-name" x="288" y="186" text-anchor="middle">Active</text>
  <text class="sub" x="288" y="210" text-anchor="middle">one Action outstanding</text>
  <text class="sub" x="288" y="228" text-anchor="middle">budget decrements per Action</text>
  <text class="tiny" x="288" y="252" text-anchor="middle">host performs work, submits Outcome</text>

  <!-- Paused -->
  <rect class="pause" x="700" y="128" width="290" height="146" rx="18"/>
  <text class="state-name" x="845" y="162" text-anchor="middle">Paused</text>
  <text class="tag" x="845" y="182" text-anchor="middle">FOUR REPORTED REASONS</text>
  <text class="mono-tiny" x="845" y="203" text-anchor="middle">decision_required</text>
  <text class="mono-tiny" x="845" y="220" text-anchor="middle">environment_unavailable</text>
  <text class="mono-tiny" x="845" y="237" text-anchor="middle">destructive_confirmation_required</text>
  <text class="mono-tiny" x="845" y="254" text-anchor="middle">budget_exhausted · CLI-only</text>
  <text class="tiny" x="845" y="269" text-anchor="middle">a changed issue source pauses as a decision</text>

  <!-- Stopped -->
  <rect class="stop" x="176" y="400" width="294" height="92" rx="18"/>
  <text class="state-name" x="323" y="434" text-anchor="middle">Stopped</text>
  <text class="sub" x="323" y="457" text-anchor="middle">pending work invalidated · journal kept</text>
  <text class="tiny" x="323" y="477" text-anchor="middle">stop · reorder · manual takeover</text>

  <!-- Ended -->
  <rect x="700" y="400" width="290" height="92" rx="18" fill="var(--term-fill)" stroke="var(--term-fill)" stroke-width="2"/>
  <text class="term-text" x="845" y="434" text-anchor="middle">Ended</text>
  <text x="845" y="457" fill="var(--term-text)" opacity="0.78" font-size="11" text-anchor="middle">automatic Action queue empty</text>
  <text x="845" y="477" fill="var(--term-text)" opacity="0.78" font-size="10" text-anchor="middle">terminal · resume is rejected</text>

  <!-- edge labels -->
  <rect class="label-bg" x="452" y="157" width="196" height="18" rx="5"/>
  <text class="edge-label" x="458" y="170">needs_input · or CLI budget exhaustion</text>

  <rect class="label-bg" x="452" y="210" width="182" height="18" rx="5"/>
  <text class="edge-label" x="458" y="223">protocol answer · confirm · skip</text>

  <rect class="label-bg" x="146" y="322" width="126" height="18" rx="5"/>
  <text class="edge-label" x="152" y="335">slipway stop &lt;run-id&gt;</text>

  <rect class="label-bg" x="368" y="322" width="130" height="18" rx="5"/>
  <text class="edge-label" x="374" y="335">protocol resume · explicit</text>

  <rect class="label-bg" x="568" y="336" width="152" height="18" rx="5"/>
  <text class="edge-label" x="574" y="349">automatic queue empty</text>

  <!-- resume invariants note -->
  <rect class="band" x="40" y="530" width="546" height="122" rx="14"/>
  <text class="tag" x="60" y="554">EVERY RESUME REVALIDATES</text>
  <text class="sub" x="60" y="578">· the original worktree identity: root, per-worktree Git dir, Git common dir</text>
  <text class="sub" x="60" y="598">· stale Action IDs, answers, source candidates, and destructive grants are voided</text>
  <text class="sub" x="60" y="618">· omitted --budget keeps a positive remainder; zero is replenished to max(initial, 3)</text>
  <text class="sub" x="60" y="638">· an explicit --budget N replaces it, applied only on the mutation that resumes</text>

  <rect class="band" x="614" y="530" width="546" height="122" rx="14"/>
  <text class="tag" x="634" y="554">ENDED IS NOT A CERTIFICATE</text>
  <text class="sub" x="634" y="578">It means only that Slipway has no more automatic Actions to issue.</text>
  <text class="sub" x="634" y="598">Tests passing, review findings, branch protection, pull-request approval,</text>
  <text class="sub" x="634" y="618">and release readiness remain separate facts that Slipway reports</text>
  <text class="sub" x="634" y="638">rather than decides.</text>
</svg>
