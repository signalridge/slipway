<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 705" width="980" font-family="Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif" role="img" aria-label="Slipway architecture model: human operator and AI coding tool feed the slipway CLI (the lifecycle execution authority); the CLI writes the repository system of record (change.yaml, events/lifecycle.jsonl, Markdown artifacts, verification YAML); read-only surfaces (next, status, validate) read state while state-mutating surfaces (run, done) write it.">
  <title>Slipway architecture model</title>
  <defs>
    <style>
      :root{
        --text:#0f172a; --muted:#64748b; --line:#94a3b8;
        --card-fill:#ffffff; --card-border:#e2e8f0;
        --band-bg:#f8fafc; --band-border:#e2e8f0;
        --entry-fill:#ecfdf5; --entry-stroke:#059669; --entry-pill:#059669;
        --plan-fill:#f0fdf4;  --plan-stroke:#16a34a;  --plan-pill:#16a34a;
        --exec-fill:#f1f5f9;  --exec-stroke:#475569;  --exec-pill:#475569;
        --verify-fill:#f7fee7;--verify-stroke:#65a30d;--verify-pill:#65a30d;
      }
      @media (prefers-color-scheme: dark){
        :root{
          --text:#e6edf3; --muted:#8b949e; --line:#475569;
          --card-fill:#161b22; --card-border:#30363d;
          --band-bg:#0d1117; --band-border:#21262d;
          --entry-fill:#053024; --entry-stroke:#34d399; --entry-pill:#10b981;
          --plan-fill:#0d2f12;  --plan-stroke:#4ade80;  --plan-pill:#16a34a;
          --exec-fill:#1e293b;  --exec-stroke:#94a3b8;  --exec-pill:#64748b;
          --verify-fill:#222b06;--verify-stroke:#bef264;--verify-pill:#84cc16;
        }
      }
      .titleBig{fill:var(--text);font-weight:700;}
      .title{fill:var(--text);font-weight:600;}
      .sub{fill:var(--muted);}
      .tag{fill:var(--muted);font-weight:700;letter-spacing:1.5px;}
      .mono{fill:var(--text);font-weight:600;font-family:ui-monospace,SFMono-Regular,'SF Mono',Menlo,Consolas,monospace;}
      .box{fill:var(--card-fill);stroke:var(--card-border);stroke-width:1.6;}
      .adapter{fill:var(--card-fill);stroke:var(--exec-pill);stroke-width:1.5;stroke-dasharray:6 5;}
      .cli{fill:var(--entry-fill);stroke:var(--entry-stroke);stroke-width:2.4;}
      .band{fill:var(--band-bg);stroke:var(--band-border);stroke-width:1.5;}
      .repoTeal{fill:var(--entry-fill);stroke:var(--entry-stroke);stroke-width:1.5;}
      .repoSlate{fill:var(--exec-fill);stroke:var(--exec-stroke);stroke-width:1.5;}
      .repoBlue{fill:var(--plan-fill);stroke:var(--plan-stroke);stroke-width:1.5;}
      .repoGreen{fill:var(--verify-fill);stroke:var(--verify-stroke);stroke-width:1.5;}
      .flow{stroke:var(--line);stroke-width:2;fill:none;}
      .arrowhead{fill:var(--line);}
      .edgeT{fill:var(--muted);font-style:italic;}
    </style>
    <marker id="ah" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path class="arrowhead" d="M0,0 L10,5 L0,10 z"/>
    </marker>
  </defs>

  <text class="titleBig" x="40" y="40" font-size="19">Slipway &#183; architecture model</text>
  <text class="sub" x="40" y="61" font-size="12.5">the repository is the system of record &#183; AI tools are adapters &#183; the CLI holds lifecycle authority</text>

  <!-- flow edges (drawn first, under cards) -->
  <line class="flow" x1="295" y1="162" x2="295" y2="298" marker-end="url(#ah)"/>
  <line class="flow" x1="685" y1="162" x2="685" y2="194" marker-end="url(#ah)"/>
  <line class="flow" x1="685" y1="262" x2="685" y2="298" marker-end="url(#ah)"/>
  <line class="flow" x1="490" y1="384" x2="490" y2="408" marker-end="url(#ah)"/>
  <line class="flow" x1="240" y1="540" x2="240" y2="588" marker-end="url(#ah)"/>
  <line class="flow" x1="735" y1="588" x2="735" y2="540" marker-end="url(#ah)"/>
  <text class="edgeT" x="252" y="568" font-size="10.5">read</text>
  <text class="edgeT" x="688" y="568" font-size="10.5">writes</text>

  <!-- L1 ACTORS -->
  <text class="tag" x="130" y="88" font-size="9.5">ACTORS</text>
  <rect class="box" x="130" y="96" width="330" height="66" rx="13"/>
  <circle cx="150" cy="118" r="5" fill="var(--exec-pill)"/>
  <text class="title" x="166" y="124" font-size="14.5">Human operator</text>
  <text class="sub" x="166" y="143" font-size="11">sets intent &#183; approves gates</text>

  <rect class="box" x="520" y="96" width="330" height="66" rx="13"/>
  <circle cx="540" cy="118" r="5" fill="var(--plan-pill)"/>
  <text class="title" x="556" y="124" font-size="14.5">AI coding tool</text>
  <text class="sub" x="556" y="143" font-size="11">executes edits in the worktree</text>

  <!-- L2 ADAPTERS -->
  <text class="tag" x="520" y="188" font-size="9.5">ADAPTERS</text>
  <rect class="adapter" x="520" y="196" width="330" height="66" rx="13"/>
  <circle cx="540" cy="218" r="5" fill="var(--exec-pill)"/>
  <text class="title" x="556" y="224" font-size="14.5">Generated adapters</text>
  <text class="sub" x="556" y="243" font-size="11">Claude &#183; Codex &#183; Cursor &#183; Gemini &#183; OpenCode</text>

  <!-- L3 CONTROL PLANE -->
  <text class="tag" x="130" y="292" font-size="9.5">CONTROL PLANE</text>
  <rect class="cli" x="130" y="300" width="720" height="84" rx="16"/>
  <text class="titleBig" x="490" y="333" text-anchor="middle" font-size="21">slipway CLI</text>
  <text class="sub" x="490" y="357" text-anchor="middle" font-size="12">single lifecycle + execution authority &#183; the only state-mutating engine</text>

  <!-- L4 REPOSITORY -->
  <rect class="band" x="40" y="408" width="900" height="132" rx="16"/>
  <text class="tag" x="60" y="432" font-size="9.5">REPOSITORY &#183; SYSTEM OF RECORD</text>

  <rect class="repoTeal" x="64" y="446" width="200" height="80" rx="11"/>
  <circle cx="82" cy="468" r="4.5" fill="var(--entry-pill)"/>
  <text class="mono" x="96" y="472" font-size="12">change.yaml</text>
  <text class="sub" x="78" y="494" font-size="10.5">current-state</text>
  <text class="sub" x="78" y="508" font-size="10.5">authority</text>

  <rect class="repoSlate" x="281" y="446" width="200" height="80" rx="11"/>
  <circle cx="299" cy="468" r="4.5" fill="var(--exec-pill)"/>
  <text class="mono" x="313" y="472" font-size="11">lifecycle.jsonl</text>
  <text class="sub" x="295" y="494" font-size="10.5">append-only</text>
  <text class="sub" x="295" y="508" font-size="10.5">lifecycle trace</text>

  <rect class="repoBlue" x="498" y="446" width="200" height="80" rx="11"/>
  <circle cx="516" cy="468" r="4.5" fill="var(--plan-pill)"/>
  <text class="title" x="530" y="472" font-size="12.5">Markdown artifacts</text>
  <text class="sub" x="512" y="494" font-size="10">intent &#183; research &#183; requirements</text>
  <text class="sub" x="512" y="508" font-size="10">decision &#183; tasks &#183; assurance</text>

  <rect class="repoGreen" x="715" y="446" width="200" height="80" rx="11"/>
  <circle cx="733" cy="468" r="4.5" fill="var(--verify-pill)"/>
  <text class="mono" x="747" y="472" font-size="11">verification/*.yaml</text>
  <text class="sub" x="729" y="494" font-size="10.5">skill + review</text>
  <text class="sub" x="729" y="508" font-size="10.5">evidence</text>

  <!-- L5 SURFACES -->
  <text class="tag" x="64" y="582" font-size="9.5">SURFACES</text>
  <rect class="box" x="64" y="590" width="400" height="84" rx="13"/>
  <circle cx="84" cy="616" r="5" fill="var(--exec-pill)"/>
  <text class="title" x="100" y="621" font-size="14.5">Read-only surfaces</text>
  <text class="mono" x="100" y="642" font-size="11.5">next &#183; status &#183; validate</text>
  <text class="sub" x="100" y="660" font-size="10.5">recompute readiness &#183; never mutate lifecycle state</text>

  <rect class="box" x="515" y="590" width="400" height="84" rx="13"/>
  <circle cx="535" cy="616" r="5" fill="var(--plan-pill)"/>
  <text class="title" x="551" y="621" font-size="14.5">State-mutating surfaces</text>
  <text class="mono" x="551" y="642" font-size="11.5">run &#183; done</text>
  <text class="sub" x="551" y="660" font-size="10.5">explicit lifecycle progression + closeout</text>
</svg>
