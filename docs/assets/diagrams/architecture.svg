<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 690" role="img" aria-labelledby="architecture-title architecture-desc">
  <title id="architecture-title">Slipway process architecture</title>
  <desc id="architecture-desc">A human explicitly invokes a generated capability in an AI coding host. The host owns model, development-tool, repository, and authorized GitHub work, and exchanges versioned Action, Outcome, and source-envelope JSON with the local Slipway CLI. The CLI validates and schedules work, observes Git independently, and persists an append-only journal, projection, and accepted materials in the Git common directory.</desc>
  <metadata id="mermaid-source"><![CDATA[
flowchart LR
  User([Human operator]) -->|explicit invocation| Capability[Generated host capability]
  subgraph Host[AI coding host · trusted executor]
    Capability --> Agent[Host execution loop]
    Agent --> Model[Model + development tools]
    Agent --> Repo[Repository worktree]
    Agent --> GitHub[GitHub · authorized only]
    Agent --> Source[Temporary source envelope]
  end
  subgraph Core[Slipway core · local deterministic state]
    CLI[Slipway CLI · Run state engine]
    Store[(Run store · journal / projection / materials)]
    CLI --> Store
  end
  Agent <-->|versioned Action / Outcome JSON| CLI
  Source -->|strict source-envelope JSON| CLI
  CLI -->|independent Git observation| Repo
]]></metadata>
  <defs>
    <style>
      :root {
        --text: #0f172a;
        --muted: #64748b;
        --line: #94a3b8;
        --card: #ffffff;
        --card-border: #e2e8f0;
        --band: #f8fafc;
        --band-border: #e2e8f0;
        --host-fill: #fff6e6;
        --host-stroke: #d98a13;
        --capability-fill: #fff0ea;
        --capability-stroke: #f2643b;
        --core-fill: #e7faf6;
        --core-stroke: #0e8077;
        --store-fill: #f3efff;
        --store-stroke: #7c5ce0;
        --slate-fill: #f1f5f9;
        --slate-stroke: #475569;
        --label-bg: #ffffff;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --text: #e6edf3;
          --muted: #8b949e;
          --line: #64748b;
          --card: #161b22;
          --card-border: #30363d;
          --band: #0d1117;
          --band-border: #30363d;
          --host-fill: #3a2606;
          --host-stroke: #fbbf24;
          --capability-fill: #3a1a10;
          --capability-stroke: #ff8a5c;
          --core-fill: #04302b;
          --core-stroke: #4fd6c6;
          --store-fill: #241b42;
          --store-stroke: #a78bfa;
          --slate-fill: #1e293b;
          --slate-stroke: #94a3b8;
          --label-bg: #0d1117;
        }
      }
      text { font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
      .title-big { fill: var(--text); font-size: 19px; font-weight: 700; }
      .title { fill: var(--text); font-size: 14px; font-weight: 650; }
      .sub { fill: var(--muted); font-size: 11px; }
      .tiny { fill: var(--muted); font-size: 9.5px; }
      .tag { fill: var(--muted); font-size: 9.5px; font-weight: 700; letter-spacing: 1.4px; }
      .mono { fill: var(--text); font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace; font-size: 10.5px; font-weight: 600; }
      .band { fill: var(--band); stroke: var(--band-border); stroke-width: 1.5; }
      .card { fill: var(--card); stroke: var(--card-border); stroke-width: 1.6; }
      .host { fill: var(--host-fill); stroke: var(--host-stroke); stroke-width: 2; }
      .capability { fill: var(--capability-fill); stroke: var(--capability-stroke); stroke-width: 1.8; }
      .core { fill: var(--core-fill); stroke: var(--core-stroke); stroke-width: 2.2; }
      .store { fill: var(--store-fill); stroke: var(--store-stroke); stroke-width: 1.8; }
      .slate { fill: var(--slate-fill); stroke: var(--slate-stroke); stroke-width: 1.5; }
      .flow { fill: none; stroke: var(--line); stroke-width: 2; }
      .flow-core { fill: none; stroke: var(--core-stroke); stroke-width: 2.2; }
      .flow-host { fill: none; stroke: var(--host-stroke); stroke-width: 2; }
      .edge-label { fill: var(--muted); font-size: 9.5px; font-style: italic; }
      .label-bg { fill: var(--label-bg); opacity: 0.96; }
      .dot-host { fill: var(--host-stroke); }
      .dot-core { fill: var(--core-stroke); }
      .dot-store { fill: var(--store-stroke); }
      .note { fill: var(--band); stroke: var(--band-border); stroke-width: 1.2; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--line)"/>
    </marker>
    <marker id="arrow-host" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--host-stroke)"/>
    </marker>
    <marker id="arrow-core" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="var(--core-stroke)"/>
    </marker>
  </defs>

  <!-- region boundaries -->
  <rect class="band" x="300" y="86" width="470" height="524" rx="18"/>
  <rect class="band" x="810" y="86" width="270" height="524" rx="18"/>

  <!-- connections: painted before cards -->
  <path class="flow-host" d="M260 305 H282 V180 H345" marker-end="url(#arrow-host)"/>
  <line class="flow-host" x1="535" y1="215" x2="535" y2="265" marker-end="url(#arrow-host)"/>
  <path class="flow" d="M445 360 V386 H435 V420" marker-end="url(#arrow)"/>
  <path class="flow" d="M625 360 V386 H635 V420" marker-end="url(#arrow)"/>
  <path class="flow" d="M400 360 H328 V552 H345" marker-end="url(#arrow)"/>
  <path class="flow" d="M670 360 H742 V552 H725" marker-end="url(#arrow)"/>
  <line class="flow-core" x1="725" y1="302" x2="835" y2="252" marker-start="url(#arrow-core)" marker-end="url(#arrow-core)"/>
  <path class="flow-core" d="M725 552 H786 V312 H835" marker-end="url(#arrow-core)"/>
  <line class="flow-core" x1="945" y1="320" x2="945" y2="420" marker-end="url(#arrow-core)"/>
  <path class="flow-core" d="M835 286 H790 V392 H635 V420" marker-end="url(#arrow-core)"/>

  <!-- actor -->
  <rect class="card" x="40" y="260" width="220" height="90" rx="14"/>
  <circle class="dot-host" cx="64" cy="286" r="5"/>
  <text class="title" x="80" y="291">Human operator</text>
  <text class="sub" x="64" y="316">sets intent · starts explicitly</text>
  <text class="sub" x="64" y="334">controls pause, stop, and resume</text>

  <!-- host execution region -->
  <text class="tag" x="322" y="112">AI CODING HOST · TRUSTED EXECUTOR</text>

  <rect class="capability" x="345" y="145" width="380" height="70" rx="13"/>
  <circle cx="369" cy="170" r="5" fill="var(--capability-stroke)"/>
  <text class="title" x="385" y="175">Generated host capability</text>
  <text class="mono" x="369" y="198">slipway-run · clarify · propose · decompose · implement · review</text>

  <rect class="host" x="345" y="265" width="380" height="95" rx="15"/>
  <text class="title-big" x="535" y="300" text-anchor="middle">AI coding host</text>
  <text class="sub" x="535" y="322" text-anchor="middle">performs work · calls the model · reports actual outcomes</text>
  <text class="tiny" x="535" y="341" text-anchor="middle">Issue content is untrusted data, never instruction authority</text>

  <rect class="slate" x="345" y="420" width="180" height="75" rx="11"/>
  <circle cx="365" cy="444" r="4.5" fill="var(--slate-stroke)"/>
  <text class="title" x="379" y="449">Model + tools</text>
  <text class="sub" x="365" y="472">model · tests · build · lint</text>

  <rect class="card" x="545" y="420" width="180" height="75" rx="11"/>
  <circle class="dot-host" cx="565" cy="444" r="4.5"/>
  <text class="title" x="579" y="449">Git worktree</text>
  <text class="sub" x="565" y="472">host reads and changes files</text>

  <rect class="card" x="345" y="520" width="180" height="65" rx="11"/>
  <circle cx="365" cy="542" r="4.5" fill="var(--capability-stroke)"/>
  <text class="title" x="379" y="547">GitHub</text>
  <text class="sub" x="365" y="568">authorized fetch / publish</text>

  <rect class="card" x="545" y="520" width="180" height="65" rx="11"/>
  <circle class="dot-core" cx="565" cy="542" r="4.5"/>
  <text class="title" x="579" y="547">Source envelope</text>
  <text class="sub" x="565" y="568">temporary · strict · pinned</text>

  <!-- Slipway core region -->
  <text class="tag" x="830" y="112">SLIPWAY CORE · LOCAL STATE</text>

  <rect class="core" x="835" y="170" width="220" height="150" rx="16"/>
  <text class="title-big" x="945" y="208" text-anchor="middle">slipway CLI</text>
  <text class="sub" x="945" y="232" text-anchor="middle">Run state engine</text>
  <text class="tiny" x="855" y="260">validates source + Outcome</text>
  <text class="tiny" x="855" y="278">issues one Action at a time</text>
  <text class="tiny" x="855" y="296">observes Git independently</text>

  <rect class="store" x="835" y="420" width="220" height="145" rx="16"/>
  <text class="title" x="945" y="450" text-anchor="middle">Run store</text>
  <text class="mono" x="945" y="471" text-anchor="middle">&lt;git-common-dir&gt;/slipway/runs</text>
  <line x1="857" y1="487" x2="1033" y2="487" stroke="var(--store-stroke)" stroke-opacity="0.45"/>
  <text class="sub" x="857" y="508">journal.jsonl · append-only</text>
  <text class="sub" x="857" y="527">run.json · replaceable projection</text>
  <text class="sub" x="857" y="546">materials · content-addressed</text>

  <!-- edge labels and title are last -->
  <rect class="label-bg" x="253" y="276" width="91" height="17" rx="5"/>
  <text class="edge-label" x="259" y="288">explicit invocation</text>

  <rect class="label-bg" x="738" y="251" width="89" height="38" rx="6"/>
  <text class="edge-label" x="744" y="265">Action / Outcome</text>
  <text class="edge-label" x="744" y="279">versioned JSON</text>

  <rect class="label-bg" x="735" y="369" width="128" height="18" rx="5"/>
  <text class="edge-label" x="741" y="382">independent Git observation</text>

  <rect class="note" x="40" y="632" width="1040" height="36" rx="10"/>
  <text class="sub" x="560" y="655" text-anchor="middle">The CLI never calls a model or GitHub API · credentials stay with the host · repository policy, CI, merge, and release remain independent</text>

  <text class="title-big" x="40" y="36">Slipway · process architecture</text>
  <text class="sub" x="40" y="58">explicit user intent · host-owned execution · deterministic local Run state</text>
</svg>
