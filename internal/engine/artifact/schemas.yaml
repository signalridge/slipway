# Artifact Taxonomy
#
# Contract artifacts (must not delete — progression/gate depends on them):
#   - artifacts/changes/<slug>/change.yaml — state machine, gates, evidence refs
#   - evidence/tasks/rv* — frozen run summaries, skill verification
#   - evidence/governance/* — governance snapshots, review evidence
#   - Per-change governed artifacts (intent.md, requirements.md, tasks.md,
#     decision.md, assurance.md, research.md) as defined by schema below
#
# Rebuildable artifacts (can be regenerated from source):
#   - artifacts/codebase/* — repo-scoped codebase map (slipway codebase-map)
#   - Command prompt surfaces — regenerated by slipway init --refresh
#   - Atomic temp files — cleanup candidates (slipway repair)
#
# Cleanup candidates (safe to remove):
#   - Stale locks — cleaned by slipway repair
#   - Evidence beyond retention window — GC'd by slipway repair
#   - Interrupted terminal archives — repaired by slipway repair
#
schemas:
  core:
    - name: intent.md
    - name: requirements.md
      depends_on: [intent.md]
    - name: tasks.md
      depends_on: [requirements.md]
    - name: assurance.md
      depends_on: [tasks.md]
      required_sections:
        - "## Scope Summary"
        - "## Verification Verdict"
        - "## Evidence Index"
        - "## Requirement Coverage"
        - "## Residual Risks and Exceptions"
        - "## Rollback Readiness"
        - "## Archive Decision"
  expanded:
    - name: intent.md
    - name: requirements.md
      depends_on: [intent.md]
    - name: decision.md
      depends_on: [intent.md, requirements.md]
      required_sections:
        - "## Alternatives Considered"
        - "## Selected Approach"
        - "## Interfaces and Data Flow"
        - "## Rollout and Rollback"
        - "## Risk"
    - name: tasks.md
      depends_on: [decision.md]
    - name: assurance.md
      depends_on: [tasks.md]
      required_sections:
        - "## Scope Summary"
        - "## Verification Verdict"
        - "## Evidence Index"
        - "## Requirement Coverage"
        - "## Residual Risks and Exceptions"
        - "## Rollback Readiness"
        - "## Archive Decision"
    - name: research.md
      requires_discovery: true
      required_sections:
        - "## Alternatives Considered"
        - "## Unknowns"
        - "## Assumptions"
        - "## Canonical References"
