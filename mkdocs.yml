site_name: Slipway
site_description: Governance CLI for AI-assisted software delivery
site_url: https://signalridge.github.io/slipway/
repo_url: https://github.com/signalridge/slipway
repo_name: signalridge/slipway
edit_uri: edit/main/docs/
copyright: Copyright &copy; SignalRidge
docs_dir: docs

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3

plugins:
  - search

nav:
  - Home: index.md
  - Start Here: start-here.md
  - Real-World Scenarios: real-world-scenarios.md
  - Tutorials:
      - First Governed Change: tutorials/first-governed-change.md
      - Onboarding Existing Codebase: tutorials/onboarding-existing-codebase.md
  - How-To:
      - Install and Refresh Adapters: how-to/install-and-refresh-adapters.md
      - Recover and Troubleshoot: how-to/recover-and-troubleshoot.md
  - Reference:
      - Commands: reference/commands.md
      - AI Tool Adapters: reference/ai-tools.md
      - Contributing: contributing.md
  - Explanation:
      - Design: explanation/design.md
      - Workflow: explanation/workflow.md
