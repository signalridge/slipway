description: 'Resolve the critical core of #66, #70, and #67 under one thesis: governance signals must not be lossily projected to a scalar (timestamp/mtime/opaque blocker) at the consume boundary; name the specific artifact and the supported remediation. #66 plus #70: rebind skill-evidence and stale-planning-chain freshness to engine-owned content digests in gitignored verification/evidence-digests.yaml; VerificationRecord and change.yaml schemas stay unchanged; the engine stamps digests only at mutating verdict acceptance during slipway run; plan-audit includes assurance.md; tasks.md uses TaskPlanSemanticHash; steady-state freshness does not consume filesystem mtime or wall-clock timestamps. Legacy file-absent migration uses a one-time verdict-timestamp safety gate before silent backfill. #70: wave-plan.generated_at becomes display/audit materialization time only and is not a freshness input. #67: S4 post-review remediation routes to goal-verification plus final-closeout, naming changed artifacts when digest diagnostics are available. #59 traceability legibility is split into a separate quick PR and #59 stays open with a per-item ledger; #71 is out of scope.'
