slug: force-within-wave-parallel-execution-as-the-default-in-wave
description: 'Force within-wave parallel execution as the default in wave-orchestration. The engine already guarantees same-wave tasks are dependency-free and file-disjoint (PlanWaves + validateWaveStaticConflicts), so make parallel the mandatory default rather than a host-conditional option: (1) flip the wave-orchestration skill from ''parallel when supported'' to parallel-by-default; (2) add an explicit parallel signal to wave-plan.yaml and surface it in slipway next --json input_context.wave_plan; (3) record dispatch mode per wave run (parallel vs degraded_sequential) so lost parallelism is visible. Single working tree relying on the file-disjoint guarantee; no engine executor — stay host-driven, not a harness.'
