version: 1
slug: fix-slipway-public-surface-trap-reported-as-signalridge-slip
description: 'Fix Slipway public-surface trap reported as signalridge/slipway#325: `slipway next --json --diagnostics` exposes `input_context.wave_plan`, a diagnostic-only projection (cmd/next.go wavePlanView) that carries view-only fields `wave_count` and `advisories`. Its shape diverges from the persistable engine-owned cache wave-plan.yaml (model.WavePlan), which has neither field. When an agent mirrors the visible projection into wave-plan.yaml, the strict KnownFields loader (internal/state/wave_execution.go) rejects the extra fields with wave_plan_load_failed, and the remediation misleadingly tells the user to update tasks.md. Make the public surface non-misleading: distinguish the diagnostic projection from the persistable cache, and make the wave_plan_load_failed remediation point at the engine-owned wave-plan cache (regenerate via the public flow / never hand-edit) instead of tasks.md. wave-plan.yaml must stay an engine-owned, non-hand-editable cache; view-only fields stay out of it.'
