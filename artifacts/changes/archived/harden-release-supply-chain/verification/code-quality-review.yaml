    ## Code Quality

    No code-quality blockers found.

    The GitHub API override hardening is cohesive and localized:

    - `cmd/tool_github.go:337-371` centralizes base URL normalization, allowlist
      enforcement, and token-class selection. Default public GitHub uses ambient
      `GH_TOKEN` / `GITHUB_TOKEN`; configured override URLs require exact
      allowlisting and `SLIPWAY_GITHUB_API_TOKEN`.
    - `cmd/tool_github.go:374-411` normalizes API base URLs before token use. The
      second repair target is closed: public `api.github.com` path-confusion cases
      are checked with `parsed.Hostname()`, so `https://api.github.com:443/evil`
      and mixed-case variants are rejected before allowlist matching.
    - `cmd/tool_github.go:536-653` validates REST pagination `Link` URLs before
      issuing follow-up token-bearing requests. The next URL must remain absolute
      HTTPS, userinfo-free, same-host, and under the configured API base path.
    - REST and GraphQL share the same validated `githubHTTPClient` construction and
      authorization path, avoiding duplicate token routing policy.

    The `BaseRef` hardening is narrow and maintainable:

    - `internal/state/worktree.go:232-275` validates `change.BaseRef` before it is
      appended to `git worktree add`.
    - Empty values default to `HEAD`.
    - Option-like refs and control-character refs fail with product-owned
      remediation before `git worktree add`.
    - Valid commit-ish refs are verified through `git rev-parse --verify --quiet
      <ref>^{commit}` and still flow as a single argv element without shell
      interpolation.

    The release workflow changes are readable and preserve the intended trust
    boundary:

    - `.github/workflows/release.yaml:22-47` performs tag validation in a
      no-secret, read-only job.
    - `.github/workflows/release.yaml:49-80` runs tests and release metadata checks
      from the validated tag output.
    - `.github/workflows/release.yaml:81-227` confines release write/package/
      attestation permissions and publishing secrets to the protected
      `release-publish` job after validation.
    - `.github/workflows/release.yaml:318-396` derives deb, rpm, apk, and binary
      smoke inputs from generated release outputs, then runs both `slipway
      --version` and `slipway --help`.

    The workflow SHA pinning is mechanically broad but easy to audit: active
    external `uses:` references are full commit SHAs with original version comments
    where useful. The fixed Go security tool installs in `security.yaml` avoid
    `@latest`.

    ## Test Quality

    No test-quality blockers found.

    The tests constrain observable behavior:

    - `cmd/tool_test.go:424-518` covers unsafe GitHub API override URLs, including
      the repaired `https://api.github.com:443/evil` and mixed-case variants, and
      proves allowlisted public path-confusion URLs are still rejected.
    - `cmd/tool_test.go:520-555` proves allowed override hosts require
      `SLIPWAY_GITHUB_API_TOKEN` and do not send ambient tokens before an override
      token is present.
    - `cmd/tool_test.go:557-602` drives unsafe pagination links through the HTTP
      client and asserts no token-bearing follow-up request is made.
    - `cmd/release_workflow_contract_test.go:16-66` parses the workflow to verify
      validation-before-secret ordering, validated checkout refs, release
      environment, permissions, and secret confinement.
    - `cmd/release_workflow_contract_test.go:68-92` executes the extracted tag
      validation shell with valid, multiline, and control-character inputs, proving
      invalid tags fail before `GITHUB_OUTPUT` is written.
    - `cmd/release_workflow_contract_test.go:94-132` asserts smoke inputs come from
      generated release outputs rather than a hard-coded version matrix.
    - `internal/state/worktree_test.go:294-361` uses filesystem and error-message
      oracles for option-like refs, control-character refs, unknown refs, and valid
      tag refs.

    The smoke-manifest contract test is necessarily static around GitHub Actions
    shape, but it checks the right boundary for this review: the workflow consumes
    generated `dist` outputs and wires those outputs into package/binary smoke jobs.
    GoReleaser config compatibility was rerun locally.

