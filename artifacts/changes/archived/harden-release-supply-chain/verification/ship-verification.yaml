    ### AC-4: GitHub API Override Token Safety

    Requirement: token-backed GitHub REST/GraphQL backend fails closed for unsafe
    API base URL overrides, and allowed overrides require an override token without
    sending ambient public GitHub tokens.

    - Exists: pass. `cmd/tool_github.go:319-371` centralizes HTTP backend
      construction, base URL normalization, allowlist enforcement, and token-class
      selection; `cmd/tool_test.go:424-602` adds negative and token-isolation tests.
    - Substantive: pass. `cmd/tool_github.go:374-410` rejects non-HTTPS,
      userinfo, query/fragment, encoded-path, non-canonical path, and path-confused
      public `api.github.com` overrides. `cmd/tool_github.go:422-462` enforces exact
      allowlisted override bases and uses `SLIPWAY_GITHUB_API_TOKEN` for overrides.
      `cmd/tool_github.go:563-624` re-authorizes pagination links before any
      follow-up token-bearing request. `cmd/tool_github.go:687-711` routes GraphQL
      through the same validated HTTP backend.
    - Wired: pass. `cmd/tool_test.go:424-602` covers unsafe URLs, allowlisted public
      path confusion, missing override token, override-token authorization, and
      unsafe pagination links. Full suite and focused coverage passed. Transcript:
      `verification/logs/ship-suite.txt` and
