    ## Line-Level Review Notes

    Release workflow:

    - `.github/workflows/release.yaml:22-48` adds `validate-tag` as the first
      no-secret, read-only job. It rejects control characters and non-semver-like
      tags before writing the validated `tag_name` output.
    - `.github/workflows/release.yaml:49-80` makes the test job depend on
      `validate-tag`, checks out `needs.validate-tag.outputs.tag_name`, and avoids
      release secrets and write permissions.
    - `.github/workflows/release.yaml:81-164` scopes release write/package/
      attestation permissions and publishing secrets to the protected
      `release-publish` environment after validation and tests.
    - `.github/workflows/release.yaml:183-221` derives smoke asset outputs from
      actual `dist/` files and fails closed when the archive, deb, rpm, or apk
      assets are absent.
    - `.github/workflows/release.yaml:318-396` consumes release job smoke outputs
      for deb/rpm/apk/binary verification and runs both `slipway --version` and
      `slipway --help`.

    CI and workflow pinning:

    - `.github/workflows/ci.yml:116-143` adds an always-running `Release Config`
      job with fixed GoReleaser `v2.16.0`, syft setup, Docker Buildx setup, config
      check, and snapshot dry run.
    - `.github/workflows/ci.yml:144-147` makes `Build` depend on `release-config`,
      so release-config failures block normal PR success.
    - `.github/workflows/security.yaml:23-26` pins `govulncheck` to `v1.5.0`;
      `.github/workflows/security.yaml:155-157` pins `go-licenses` to `v1.6.0`.
    - Static search found no remaining `uses:` ref outside a full 40-character SHA
      and no `@latest`, `@main`, or `@master` tool install in `.github/workflows`.

    GitHub API override safety:

    - `cmd/tool_github.go:337-371` centralizes GitHub API URL/token resolution.
      Override URLs must be allowlisted and require `SLIPWAY_GITHUB_API_TOKEN`.
      Ambient `GH_TOKEN` and `GITHUB_TOKEN` stay limited to the default public
      GitHub API path.
    - `cmd/tool_github.go:374-410` rejects HTTP, userinfo, query/fragment,
      encoded-path, non-canonical-path, and path-confused public `api.github.com`
      overrides, including default-port path confusion.
    - `cmd/tool_github.go:563-624` validates pagination `Link` targets before
      following them with an Authorization header, preventing cross-host or base-path
      escape follow-up requests.
    - `cmd/tool_github.go:687-711` routes GraphQL through the same validated HTTP
      backend and token selection.
    - `cmd/tool_test.go:424-602` covers unsafe override URLs, allowlisted public
      path confusion, missing override token, override-token authorization, and
      unsafe pagination links. `cmd/tool_test.go:669-683` keeps API tests on TLS
      test servers with injected transport and override-token env setup.

    BaseRef validation:

    - `internal/state/worktree.go:236-240` validates `change.BaseRef` before it is
      appended to `git worktree add`.
    - `internal/state/worktree.go:259-274` defaults empty refs to `HEAD`, rejects
      option-like and control-character refs, and verifies commit-ish resolution via
      `git rev-parse --verify --quiet`.
    - `internal/state/worktree_test.go:294-362` covers option-like refs, control
      characters, unknown refs, and valid tag refs, including assertions that
      invalid refs fail before a worktree directory is created.

