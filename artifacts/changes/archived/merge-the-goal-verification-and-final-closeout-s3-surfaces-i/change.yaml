slug: merge-the-goal-verification-and-final-closeout-s3-surfaces-i
description: 'Merge the goal-verification and final-closeout S3 surfaces into a single pre-ship verification stage. Direction B from design analysis: the two are the only S3 skills with run_tests; both verify completion; final-closeout already reuses goal-verification''s suite proof, so they are one verification concern artificially split into two peers. The merged surface owns suite-result.yaml production, acceptance-criteria (3-level) proof, guardrail high_risk_check SAST baseline, and the final pre-ship freshness/assurance/independence closeout stamp, gated hard on G_ship. Retire the proof-reuse-edge machinery between them (closeoutGoalVerificationReuseBlockers / proofReuseEdge), the goal<->closeout chain-order invariant, and the now-dead reason codes (closeout_goal_verification_reuse_invalid, closeout_chain_order_invalid). Reclassify the surface out of the review taxonomy (IsReviewSkill / reviewSkillGoal): it is verification that runs tests, not an adversarial read like spec/code/independent/security. Keep all fail-closed properties; this is a breaking change to the governance evidence contract, CLI JSON, generated skills, and docs.'
