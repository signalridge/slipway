slug: eliminate-generated-claude-gemini-hook-launcher-scripts-by-i
description: Eliminate generated Claude/Gemini hook launcher scripts by inlining the `slipway hook` command directly into host settings.json, and make the `slipway hook` subcommands fail-silent (always exit 0). This removes the missing-file, relative-path/CWD, and cross-platform-launcher failure modes that caused PostToolUse hooks to fail with "No such file or directory".
