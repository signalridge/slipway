slug: pr1-tier-1-public-surface-discoverability-and-recovery-corre
description: 'PR1 / Tier 1 - public-surface discoverability and recovery correctness across two issues. #315: add a `slipway config` command that lists every .slipway.yaml key (name, type, default, allowed-values, scope) derived from the internal/model/config.go struct so the catalog cannot drift (mirror the --list-focuses pattern, contract-tested). Tier 1 config surface: `slipway config` / `config list [--json]`, `config get <key> [--json]`, and `config set <key> <value>` for validated persistence. Also surface the 3 behavior-affecting env vars (SLIPWAY_GITHUB_API_URL, SLIPWAY_CONTEXT_WINDOW_TOKENS, SLIPWAY_SESSION_OWNER) in the relevant --help, add a back-pointer from `run --help` to the config surface, and warn (not silently swallow) on unknown top-level config keys (sub-finding A). OUT OF SCOPE: the R1-R4 recovery-routing items listed inside #315 (their own issues). #324: fix S2_IMPLEMENT stale wave-orchestration evidence recovery - `slipway run` currently recommends `slipway fix`, but fix only runs in S3_REVIEW so it returns fix_state_invalid; the recovery for stale wave-orchestration evidence in S2 must point to a state-valid S2 command/remediation instead.'
