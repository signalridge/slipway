version: 1
slug: add-an-engine-owned-per-change-slipway-handoff-command-write
description: 'Add an engine-owned, per-change `slipway handoff` command (write/show; bare handoff = write) that becomes the writer and reader for the runtime session handoff at .git/slipway/runtime/changes/<slug>/handoff.md. The engine stamps a deterministic machine header with identity and freshness fields only (slug, monotonic generation, session_owner, git branch/worktree, updated_at, staleness) and guarantees the narrative skeleton; the agent fills narrative substance. The header deliberately does not snapshot lifecycle position or next action: current_state/substep and next_skill/next_command remain owned by `slipway status` and `slipway next`, and the handoff only points resumers to those commands. Generate a hook-agnostic `slipway-handoff` command/skill surface via toolgen, re-point the existing PostToolUse context-pressure nudge to `slipway handoff write`, extend the existing SessionStart hook to surface `handoff show --brief` as a bounded pointer after the authoritative next-action block, and generate repo-local Codex hooks in `.codex/config.toml` (SessionStart bounded pointer plus staleness-conditioned UserPromptSubmit write nudge) through the same `slipway hook` handlers. Handoff remains advisory only - never lifecycle authority, governed evidence, freshness input, or a gate. Legacy repo-level handoff migration, a `migrate` subcommand, new Claude PreCompact hooks, and Codex trust grants are out of scope.'
