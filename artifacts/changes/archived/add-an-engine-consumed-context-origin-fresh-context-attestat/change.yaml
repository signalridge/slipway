version: 1
slug: add-an-engine-consumed-context-origin-fresh-context-attestat
description: 'Add an engine-consumed context-origin / fresh-context attestation contract so independence-critical lifecycle steps cannot be satisfied from the authoring context. Today the engine only truly enforces fresh context at S2 wave dispatch (DispatchEvidenceBlockers, defeatable via self-asserted degraded_sequential) and the goal-verification SAST safety_baseline; review/verify/closeout rely on host-honored markdown and self-asserted tokens the engine ignores. Concretely: final-closeout writes closeout:reviewer_independence=pass (SKILL.md L160) but NO engine code consumes it (authority.go parses only closeout:assurance_complete=pass at :210/:238), so the same context that authored, reviewed, and verified can also perform closeout and stamp independence=pass. The objective is a tamper-evident, engine-consumed attestation binding a verdict''s context-origin (distinct-from-authoring), starting with making final-closeout''s reviewer_independence actually gated, then extending to chain-binding across spec-compliance-review, code-quality-review, and goal-verification to close the serial author->review->verify->close collapse. The engine stays the sole inline verdict-stamping authority; the fix is an attestation the gate consumes, NOT spawning review/verify hosts as leaf subagents.'
